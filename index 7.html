document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  const FONT_MIME = /^(font[/]|application[/](x-)?font-|application[/]vnd\.ms-fontobject)/i;
  const MIME_TOKEN = /^[\w.+-]+[/][\w.+-]+$/;
  function toBase64(bytes) {
    let bin = '';
    for (let i = 0; i < bytes.length; i += 0x8000) {
      bin += String.fromCharCode.apply(null, bytes.subarray(i, i + 0x8000));
    }
    return btoa(bin);
  }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    // Failed resource loads (CSP-blocked links, scripts, images) fire plain
    // events at the element — warn only; real JS errors carry message/error.
    if (!e.message && !e.error && e.target && e.target !== window) {
      console.warn('[bundle] resource failed to load:',
        e.target.tagName, String(e.target.src || e.target.href || ''));
      return;
    }
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {

    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    // Nested page bundles (iframe targets). Each ships ONCE, in the ROOT
    // document's manifest; frame srcs carry an about:blank#<uuid> marker
    // instead of a substitutable uuid. Every document mints the blobs for
    // its OWN frames — from local text at the root, or text obtained from
    // its DIRECT parent over the relay protocol below — so each frame
    // navigation stays same-origin with its initiator and a deduped page
    // loads at any depth on any host, including a file:// download's
    // opaque origins (where a blob minted by one document cannot be
    // navigated to by another).
    const pageOrderEl = document.querySelector('script[type="__bundler/page_order"]');
    const pageOrder = pageOrderEl ? JSON.parse(pageOrderEl.textContent) : [];
    const pageSet = new Set(pageOrder);
    const pageTexts = {};

    // ── Nested-page text protocol (parent-chain relay) ──
    // Page bundles ship once, in the ROOT document's manifest. Every
    // document mints the blobs for its OWN frames, obtaining page text
    // through a strict parent-chain relay: a document only ever SENDS to
    // its direct parent (which, for every document the publisher's own
    // runtime minted, is another publisher document) and only ACCEPTS
    // text from that direct parent; requests from below are honored only
    // for the document's own child frames, and the ROOT never sends
    // upward at all. That last rule is load-bearing: the artifact host's
    // frame-ancestors allows claude.ai (and friends) to frame an
    // artifact, so window.top can be a FOREIGN document — a top-addressed
    // protocol would hand page uuids to that ancestor and accept forged
    // "page text" from it, minting attacker HTML as an artifact-origin
    // blob document. The chain never touches the ancestor: requests stop
    // at the root, replies are origin-addressed per hop (never '*' when
    // an origin exists), and both directions are origin-gated (on https
    // a foreign sender's origin can never equal this document's; in
    // opaque contexts — file:// — everything serializes as 'null', where
    // an embedded EXTERNAL frame still fails the gate by carrying its
    // own real origin, and a sandboxed child of such a frame is excluded
    // by the own-child-frames check plus uuid unguessability). Shape is
    // deny-by-default: one request form, one reply form, no error
    // replies.
    // window.origin is the SERIALIZED SECURITY origin ('null' in opaque
    // contexts such as a sandboxed preview iframe) — location.origin is
    // computed from the URL and stays 'https://…' even when the document
    // is sandboxed, which would misgate every opaque chain.
    const OWN_TARGET = /^https?:[/][/]/.test(window.origin || '')
      ? window.origin
      : '*';
    function trustedOrigin(e) {
      if (e.origin === window.origin) return true; // https chains; opaque==opaque
      // file:// trees: Chrome serializes the file document's origin as
      // 'file://' while the blob: documents it mints serialize as 'null',
      // so the two legitimate shapes can never string-match — accept the
      // pair in both directions. https origins never serialize as either,
      // and sender identity (own child frame / direct parent) is checked
      // separately.

        (e.origin === 'null' &&
          (window.origin === 'file://' ||
            window.location.protocol === 'file:')) ||
        (/^file:/.test(e.origin) && window.origin === 'null')
      );
    }
    // Non-empty only in the root document (nested bundles ship an empty
    // island), so it doubles as the root marker: the root answers from
    // local text and treats a miss as authoritative — never relaying to
    // its (possibly foreign) parent.
    const isPageRoot = pageOrder.length > 0;
    const blobUrls = {};
    const resourceBlobs = {};
    const UUID_SHAPE = /^[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}$/;
    const pendingFrames = {}; // uuid -> [{el, frag}] awaiting text for own frames
    const pendingRelays = {}; // uuid -> [childWindow] awaiting text to pass down
    function mountPage(el, frag, text) {
      const pageBlob = new Blob([text], { type: 'text/html' });
      const u = URL.createObjectURL(pageBlob);
      resourceBlobs[u] = pageBlob;
      el.src = u + frag;
    }
    function deliverPage(uuid, text) {
      const frames = pendingFrames[uuid];
      delete pendingFrames[uuid];
      if (frames) for (const f of frames) mountPage(f.el, f.frag, text);
      const relays = pendingRelays[uuid];
      delete pendingRelays[uuid];
      if (relays) {
        for (const cw of relays) {
          try { cw.postMessage({ __bundler_page: uuid, __bundler_text: text }, OWN_TARGET); } catch (err) { /* gone */ }
        }
      }
    }
    function ownFrameWindows() {
      const out = [];
      for (const f of Array.from(document.querySelectorAll('iframe'))) {
        try { if (f.contentWindow) out.push(f.contentWindow); } catch (err) { /* detached */ }
      }
      return out;
    }
    window.addEventListener('message', function (e) {
      const d = e.data;
      if (!d || typeof d !== 'object' || !e.source) return;
      // Origin gate first; the structural checks below (own-child-frames
      // for requests, direct-parent + solicited-uuid for replies, the
      // root's never-relay rule) are what hold in fully opaque chains
      // where origin strings can't discriminate — a sandboxed root's
      // FOREIGN wrapper still fails all three even though both serialize
      // as real-vs-'null' rather than matching.
      if (!trustedOrigin(e)) return;
      if (typeof d.__bundler_need === 'string' && UUID_SHAPE.test(d.__bundler_need)) {
        // Requests are honored only for this document's own child frames.
        if (ownFrameWindows().indexOf(e.source) < 0) return;
        const uuid = d.__bundler_need;
        const text = pageTexts[uuid];
        if (typeof text === 'string') {
          try { e.source.postMessage({ __bundler_page: uuid, __bundler_text: text }, OWN_TARGET); } catch (err) { /* gone */ }
          return;
        }
        if (isPageRoot || window.parent === window) return; // authoritative miss
        const waiting = pendingRelays[uuid];
        if (waiting) {
          if (waiting.indexOf(e.source) < 0) waiting.push(e.source);
          return;
        }
        // Never-answered uuids would otherwise accumulate forever under a
        // request spray; past the cap (far above any real page count) new
        // relays are dropped rather than remembered.
        if (Object.keys(pendingRelays).length >= 128) return;
        pendingRelays[uuid] = [e.source];
        window.parent.postMessage({ __bundler_need: uuid }, OWN_TARGET);
      } else if (
        typeof d.__bundler_page === 'string' &&
        UUID_SHAPE.test(d.__bundler_page) &&
        typeof d.__bundler_text === 'string'
      ) {
        // The shape test is load-bearing beyond tidiness: the solicited
        // check below uses the in operator, which matches prototype keys
        // ('__proto__', 'constructor') — an unshaped key would reach
        // deliverPage and throw, painting the error banner.
        // Text is accepted only from the direct parent — the document
        // that minted this one.
        if (e.source !== window.parent || window.parent === window) return;
        if (!(d.__bundler_page in pendingFrames) && !(d.__bundler_page in pendingRelays)) return;
        deliverPage(d.__bundler_page, d.__bundler_text);
      }
    });

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        if (pageSet.has(uuid)) {
          pageTexts[uuid] = new TextDecoder().decode(finalBytes);
          return;
        }
        if (FONT_MIME.test(entry.mime) && MIME_TOKEN.test(entry.mime)) {
          // Strict artifact hosts allow font-src data: but not blob:.
          blobUrls[uuid] = 'data:' + entry.mime + ';base64,' +
            (entry.compressed ? toBase64(finalBytes) : entry.data);
        } else {
          const blob = new Blob([finalBytes], { type: entry.mime });
          blobUrls[uuid] = URL.createObjectURL(blob);
          resourceBlobs[blobUrls[uuid]] = blob;
        }
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        const blob = new Blob([], { type: entry.mime });
        blobUrls[uuid] = URL.createObjectURL(blob);
        resourceBlobs[blobUrls[uuid]] = blob;
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    // Artifact-host CSP (connect-src 'self') refuses fetch() of blob: URLs —
    // consumers read these Blobs directly. Survives the swap like the error sink.
    window.__resourceBlobs = resourceBlobs;

    setStatus('Rendering...');
    // Page uuids have no blob here — they ride inside about:blank#<uuid>
    // frame markers the pass below resolves after the swap.
    for (const uuid of uuids) {
      if (pageSet.has(uuid)) continue;
      template = template.split(uuid).join(blobUrls[uuid]);
    }

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).replace(/<\//g, '<\\/') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);

    // Resolve page-frame markers: mint this document's own blob for each
    // framed page — from local text when this is the root, otherwise by
    // asking the direct parent over the relay protocol above. An
    // unanswered request leaves the frame on about:blank, the same
    // degraded state as a refused embed.
    {
      const MARKER = /^about:blank#([0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12})(#.*)?$/;
      const needed = [];
      for (const el of Array.from(document.querySelectorAll('iframe'))) {
        const m = MARKER.exec(el.getAttribute('src') || '');
        if (!m) continue;
        const text = pageTexts[m[1]];
        if (typeof text === 'string') {
          mountPage(el, m[2] || '', text);
        } else if (window.parent !== window && !isPageRoot) {
          const had = pendingFrames[m[1]];
          (pendingFrames[m[1]] = had || []).push({ el: el, frag: m[2] || '' });
          if (!had) needed.push(m[1]);
        }
      }
      for (const uuid of needed) {
        window.parent.postMessage({ __bundler_need: uuid }, OWN_TARGET);
      }
    }

    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: read and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const pre = resourceBlobs[s.src.split('#')[0]];
        s.textContent = pre ? await pre.text() : await (await fetch(s.src)).text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

yle=\"border:1px solid #CFC7AE;background:#fff;padding:14px 16px;font-size:14.5px;color:#16142E;\">\n        <\u002Fdiv>\n        <textarea name=\"notes\" required=\"\" rows=\"3\" placeholder=\"How would you like to partner with us? *\" style=\"border:1px solid #CFC7AE;background:#fff;padding:14px 16px;font-size:14.5px;color:#16142E;resize:vertical;\"><\u002Ftextarea>\n        <button type=\"submit\" style=\"background:#06037A;color:#fff;border:none;padding:16px 28px;font-size:15px;font-weight:800;cursor:pointer;transition:all .25s;\" style-hover=\"background:linear-gradient(135deg,#FFD663,#D2AA24);color:#06037A;\">Submit partnership enquiry →<\u002Fbutton>\n        <p style=\"font-size:12.5px;color:#8B88A0;margin:0;text-align:center;\">We review every enquiry personally and reply by WhatsApp or email.<\u002Fp>\n      <\u002Fform>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsc-if>\n<sc-if value=\"{{ showBooking }}\" hint-placeholder-val=\"{{ false }}\">\n  <div data-screen-label=\"Booking modal\" style=\"position:fixed;inset:0;z-index:100;display:flex;align-items:center;justify-content:center;padding:24px;\">\n    <div sc-camel-on-click=\"{{ closeModal }}\" style=\"position:absolute;inset:0;background:rgba(6,3,122,0.74);backdrop-filter:blur(4px);\"><\u002Fdiv>\n    <div class=\"m-pad-sm\" style=\"position:relative;background:#FAF8F2;width:680px;max-width:100%;max-height:90vh;overflow-y:auto;padding:48px;box-shadow:0 24px 80px rgba(0,0,0,0.35);animation:heroUp .4s cubic-bezier(.2,.7,.2,1) both;\">\n      <button sc-camel-on-click=\"{{ closeModal }}\" style=\"position:absolute;top:18px;right:20px;background:none;border:none;font-size:24px;color:#5C5972;cursor:pointer;line-height:1;\" style-hover=\"color:#06037A;\">×<\u002Fbutton>\n      <div style=\"font-size:12px;letter-spacing:0.24em;text-transform:uppercase;color:#A8851A;font-weight:700;margin-bottom:14px;\">Free &amp; without obligation<\u002Fdiv>\n      <h3 style=\"font-weight:800;font-size:32px;margin:0 0 10px;color:#06037A;letter-spacing:-0.02em;\">Book a Free Consultation<\u002Fh3>\n      <p style=\"font-size:14.5px;line-height:1.65;color:#5C5972;margin:0 0 32px;\">Pick a day and time that suits you. We confirm availability by WhatsApp or email.<\u002Fp>\n      <form sc-camel-on-submit=\"{{ submitBooking }}\" style=\"display:grid;gap:24px;\">\n        <div>\n          <div style=\"font-size:12px;letter-spacing:0.12em;text-transform:uppercase;color:#06037A;font-weight:700;margin-bottom:10px;\">Day<\u002Fdiv>\n          <div style=\"display:flex;gap:8px;flex-wrap:wrap;\">\n            <sc-for list=\"{{ dayOptions }}\" as=\"d\" hint-placeholder-count=\"6\">\n              <button type=\"button\" sc-camel-on-click=\"{{ d.pick }}\" style=\"{{ d.style }}\"><span style=\"display:block;font-size:11px;opacity:0.7;\">{{ d.dow }}<\u002Fspan><span style=\"display:block;font-weight:700;\">{{ d.date }}<\u002Fspan><\u002Fbutton>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div>\n          <div style=\"font-size:12px;letter-spacing:0.12em;text-transform:uppercase;color:#06037A;font-weight:700;margin-bottom:10px;\">Time<\u002Fdiv>\n          <div style=\"display:flex;gap:8px;flex-wrap:wrap;\">\n            <sc-for list=\"{{ timeOptions }}\" as=\"t\" hint-placeholder-count=\"6\">\n              <button type=\"button\" sc-camel-on-click=\"{{ t.pick }}\" style=\"{{ t.style }}\">{{ t.label }}<\u002Fbutton>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div>\n          <div style=\"font-size:12px;letter-spacing:0.12em;text-transform:uppercase;color:#06037A;font-weight:700;margin-bottom:10px;\">Time zone<\u002Fdiv>\n          <sc-raw-select name=\"tz\" style=\"border:1px solid #CFC7AE;background:#fff;padding:13px 14px;font-size:14.5px;color:#16142E;width:100%;\">\n            <option>Gulf Standard Time (UTC+4), Dubai<\u002Foption>\n            <option>East Africa Time (UTC+3), Addis Ababa<\u002Foption>\n            <option>Central European Time (UTC+1)<\u002Foption>\n            <option>Greenwich Mean Time (UTC+0), London<\u002Foption>\n            <option>India Standard Time (UTC+5:30)<\u002Foption>\n            <option>Eastern Time (UTC-5), New York<\u002Foption>\n            <option>Pacific Time (UTC-8), Los Angeles<\u002Foption>\n          <\u002Fsc-raw-select>\n        <\u002Fdiv>\n        <div class=\"m-1col\" style=\"display:grid;grid-template-columns:1fr 1fr;gap:18px;\">\n          <input name=\"name\" required=\"\" placeholder=\"Full name *\" style=\"border:1px solid #CFC7AE;background:#fff;padding:14px 16px;font-size:14.5px;color:#16142E;\">\n          <input name=\"email\" type=\"email\" required=\"\" placeholder=\"Email *\" style=\"border:1px solid #CFC7AE;background:#fff;padding:14px 16px;font-size:14.5px;color:#16142E;\">\n        <\u002Fdiv>\n        <input name=\"phone\" required=\"\" placeholder=\"Phone / WhatsApp *\" style=\"border:1px solid #CFC7AE;background:#fff;padding:14px 16px;font-size:14.5px;color:#16142E;\">\n        <textarea name=\"notes\" required=\"\" rows=\"3\" placeholder=\"Your business &amp; intentions *\" style=\"border:1px solid #CFC7AE;background:#fff;padding:14px 16px;font-size:14.5px;color:#16142E;resize:vertical;\"><\u002Ftextarea>\n        <button type=\"submit\" style=\"background:#06037A;color:#fff;border:none;padding:16px 28px;font-size:15px;font-weight:800;cursor:pointer;transition:all .25s;\" style-hover=\"background:linear-gradient(135deg,#FFD663,#D2AA24);color:#06037A;\">Request preferred slot →<\u002Fbutton>\n        <p style=\"font-size:12.5px;color:#8B88A0;margin:0;text-align:center;\">This is a request, not a confirmed booking. We will confirm availability by WhatsApp or email.<\u002Fp>\n      <\u002Fform>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsc-if>\n\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\">\nclass Component extends DCLogic {\n  state = { modal: null, menuOpen: false, expanded: null, jur: 'Free Zone', act: 'Services', visas: 2, office: 'Flexi desk', day: 0, time: '10:00' };\n\n  componentDidMount() {\n    requestAnimationFrame(() => {\n      const io = new IntersectionObserver((entries) => {\n        entries.forEach((en) => {\n          if (en.isIntersecting) {\n            en.target.style.opacity = '1';\n            en.target.style.transform = 'translateY(0)';\n            io.unobserve(en.target);\n          }\n        });\n      }, { threshold: 0.12 });\n      document.querySelectorAll('[data-reveal]').forEach((el) => {\n        const r = el.getBoundingClientRect();\n        if (r.top < window.innerHeight) return; // already visible on load\n        el.style.opacity = '0';\n        el.style.transform = 'translateY(30px)';\n        el.style.transition = 'opacity .8s cubic-bezier(.2,.7,.2,1), transform .8s cubic-bezier(.2,.7,.2,1)';\n        el.style.transitionDelay = (el.getAttribute('data-reveal') || '0') + 'ms';\n        io.observe(el);\n      });\n    });\n  }\n\n  mapSvcs(list) {\n    const s = this.state;\n    return list.map((it, i) => ({\n      ...it,\n      open: s.expanded === i,\n      sign: s.expanded === i ? '−' : '+',\n      toggle: () => this.setState(st => ({ expanded: st.expanded === i ? null : i })),\n    }));\n  }\n\n  pillStyle(active) {\n    return active\n      ? { background: '#06037A', color: '#FFD663', border: '1px solid #06037A', padding: '11px 18px', fontSize: '14px', fontWeight: 700, cursor: 'pointer' }\n      : { background: '#fff', color: '#16142E', border: '1px solid #CFC7AE', padding: '11px 18px', fontSize: '14px', fontWeight: 500, cursor: 'pointer' };\n  }\n\n  wa(text) { return 'https://wa.me/971559330941?text=' + encodeURIComponent(text); }\n\n  days() {\n    const out = [];\n    const d = new Date();\n    while (out.length < 6) {\n      d.setDate(d.getDate() + 1);\n      const dow = d.getDay();\n      if (dow === 0 || dow === 6) continue;\n      out.push({\n        dow: ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'][dow],\n        date: d.toLocaleDateString('en-GB', { day: 'numeric', month: 'short' }),\n      });\n    }\n    return out;\n  }\n\n  renderVals() {\n    const s = this.state;\n    const set = (k, v) => () => this.setState({ [k]: v });\n    const mkOpts = (list, key) => list.map(label => ({\n      label, pick: set(key, label), style: this.pillStyle(s[key] === label),\n    }));\n    const dayList = this.days();\n    const times = ['09:00', '10:00', '11:30', '14:00', '15:30', '17:00'];\n    const submit = (kind) => (e) => {\n      e.preventDefault();\n      const f = e.target;\n      const v = (n) => (f.elements[n] ? f.elements[n].value : '');\n      let text;\n      if (kind === 'estimate') {\n        text = `Hello And Again Advisory, I'd like a cost estimate.\\nJurisdiction: ${s.jur}\\nActivity: ${s.act}\\nVisas: ${s.visas >= 6 ? '6+' : s.visas}\\nOffice: ${s.office}\\nName: ${v('name')}\\nEmail: ${v('email')}\\nPhone: ${v('phone')}\\nAbout: ${v('notes')}`;\n      } else if (kind === 'partner') {\n        text = `Hello And Again Advisory, I'd like to become a partner.\\nPartnership type: ${v('ptype')}\\nName: ${v('name')}\\nCompany: ${v('company')}\\nEmail: ${v('email')}\\nPhone: ${v('phone')}\\nHow we'd like to partner: ${v('notes')}`;\n      } else {\n        const d = dayList[s.day];\n        text = `Hello And Again Advisory, I'd like to book a free consultation.\\nPreferred slot: ${d.dow} ${d.date} at ${s.time}\\nTime zone: ${v('tz')}\\nName: ${v('name')}\\nEmail: ${v('email')}\\nPhone: ${v('phone')}\\nAbout: ${v('notes')}`;\n      }\n      window.open(this.wa(text), '_blank');\n      this.setState({ modal: null });\n    };\n    const askWa = (topic) => this.wa(`Hello And Again Advisory, I'd like to ask about ${topic}.`);\n    const zones = ['DMCC', 'IFZA', 'Meydan Free Zone', 'RAKEZ', 'SHAMS', 'DAFZA', 'JAFZA', 'SPC Free Zone', 'Dubai Mainland', 'Abu Dhabi Mainland'];\n    return {\n      showEstimate: s.modal === 'estimate',\n      showBooking: s.modal === 'booking',\n      openEstimate: set('modal', 'estimate'),\n      openBooking: set('modal', 'booking'),\n      openPartner: set('modal', 'partner'),\n      showPartner: s.modal === 'partner',\n      closeModal: set('modal', null),\n      menuOpen: s.menuOpen,\n      menuIcon: s.menuOpen ? '\\u00d7' : '\\u2630',\n      toggleMenu: () => this.setState(st => ({ menuOpen: !st.menuOpen })),\n      closeMenu: set('menuOpen', false),\n      openEstimateFromMenu: () => this.setState({ menuOpen: false, modal: 'estimate' }),\n      openBookingFromMenu: () => this.setState({ menuOpen: false, modal: 'booking' }),\n      openPartnerFromMenu: () => this.setState({ menuOpen: false, modal: 'partner' }),\n      tickerItems: [...zones, ...zones],\n      jurOptions: mkOpts(['Free Zone', 'Mainland'], 'jur'),\n      actOptions: mkOpts(['Services', 'Commercial', 'Trading'], 'act'),\n      officeOptions: mkOpts(['None', 'Flexi desk', 'Dedicated'], 'office'),\n      visasLabel: s.visas >= 6 ? '6+' : String(s.visas),\n      visasUp: () => this.setState(st => ({ visas: Math.min(6, st.visas + 1) })),\n      visasDown: () => this.setState(st => ({ visas: Math.max(0, st.visas - 1) })),\n      dayOptions: dayList.map((d, i) => ({\n        ...d, pick: set('day', i),\n        style: { ...this.pillStyle(s.day === i), padding: '9px 16px', textAlign: 'center', lineHeight: 1.35 },\n      })),\n      timeOptions: times.map(t => ({ label: t, pick: set('time', t), style: this.pillStyle(s.time === t) })),\n      submitEstimate: submit('estimate'),\n      submitBooking: submit('booking'),\n      submitPartner: submit('partner'),\n      heroStats: [\n        { n: '40+', label: 'Free zones across the UAE' },\n        { n: '7', label: 'Mainland jurisdictions covered' },\n        { n: '2–3 weeks', label: 'First conversation to registered company' },\n        { n: '7–14 days', label: 'Typical company formation timeline' },\n      ],\n      principles: [\n        { num: '01', delay: 0, title: 'Clarity', body: 'Clear guidance on structure, licensing, and real costs, before you commit a single dirham.' },\n        { num: '02', delay: 100, title: 'Coordination', body: 'One advisory point managing every partner, authority, and step of the setup process.' },\n        { num: '03', delay: 200, title: 'Continuity', body: 'Support across the full journey, from company formation through operational readiness.' },\n        { num: '04', delay: 300, title: 'Confidence', body: 'Reliable advice so every decision is backed by expertise and a trusted partner.' },\n      ],\n      stages: [\n        { num: '1', delay: 0, title: 'Consultation', body: 'We learn your business and what matters most. Free and without obligation.', outcome: 'a clear picture of your options' },\n        { num: '2', delay: 80, title: 'Structure & pathway', body: 'We recommend Free Zone or Mainland, jurisdiction, and licence, with full cost clarity.', outcome: 'a recommended structure with itemised costs' },\n        { num: '3', delay: 160, title: 'Formation', body: 'We coordinate registration, trade name, licence, and documentation. Typically 7–14 days.', outcome: 'your licence issued and company registered' },\n        { num: '4', delay: 240, title: 'Activation', body: 'Visas, Emirates ID, corporate bank account, compliance, and workspace.', outcome: 'an operational company, not just a licence' },\n        { num: '5', delay: 320, title: 'Ongoing support', body: 'Renewals, new visas, and partner introductions as your business grows.', outcome: 'deadlines handled before they become problems' },\n      ],\n      services: this.mapSvcs([\n        { num: '01', delay: 0, title: 'UAE Business Setup', tag: 'Mainland & Free Zone', body: 'The right jurisdiction, structure, and licence shape your costs and ownership for years. We advise first, then manage the entire formation end to end.', bullets: 'Jurisdiction & structure advisory · Licence selection & trade name · PRO & government liaison · Visa & bank account facilitation', wa: askWa('UAE Business Setup') },\n        { num: '02', delay: 80, title: 'Feasibility Studies', tag: 'Market validation', body: 'Before you commit capital, know whether the numbers work. Our studies test real demand, regulation, and financial viability.', bullets: 'Market & competitor assessment · Licensing & regulatory review · Financial projections & break-even · Risk assessment', wa: askWa('a Feasibility Study') },\n        { num: '03', delay: 0, title: 'Business Plans', tag: 'Investor-ready', body: 'A plan built to withstand investor scrutiny, support bank and visa submissions, and guide your execution, not a template with your name on it.', bullets: 'Business model & opportunity · Go-to-market strategy · 5-year financial model · Investor & bank-ready format', wa: askWa('a Business Plan') },\n        { num: '04', delay: 80, title: 'Market Research', tag: 'UAE intelligence', body: 'Targeted research on demand, competition, and pricing, specific to the UAE and GCC, not recycled global reports.', bullets: 'Industry sizing & growth · Consumer behaviour & demand · Competitive benchmarking · Pricing & positioning', wa: askWa('Market Research') },\n        { num: '05', delay: 0, title: 'Market Entry Strategy', tag: 'Path to launch', body: 'How you enter the market is where value is made or lost. We build the entry plan around your sector and ambition.', bullets: 'Readiness assessment · Entry mode & channel strategy · Partnership & distribution · Phased launch roadmap', wa: askWa('Market Entry Strategy') },\n        { num: '06', delay: 80, title: 'Corporate Tax & Compliance', tag: 'CT & FTA', body: 'UAE Corporate Tax applies above AED 375,000 in taxable income. Getting registration and structure right from day one avoids costly corrections later.', bullets: 'CT registration with the FTA · Taxable person assessment · Small business relief eligibility · Return preparation & filing', wa: askWa('Corporate Tax & Compliance') },\n        { num: '07', delay: 0, title: 'VAT Registration & Filing', tag: 'VAT compliance', body: 'VAT at 5% applies to most goods and services. We handle registration, quarterly filing, and compliance reviews so deadlines never surprise you.', bullets: 'VAT registration with the FTA · Mandatory vs voluntary guidance · Quarterly return preparation · Compliance health checks', wa: askWa('VAT Registration & Filing') },\n        { num: '08', delay: 80, title: 'Relocation & Concierge', tag: 'Beyond the licence', body: 'Relocating to Dubai is more than a visa. We support you and your family through residency, banking, housing, and schooling.', bullets: 'Investor & partner visas · Emirates ID & banking support · Housing & schooling guidance · Settling-in support', wa: askWa('Relocation & Concierge') },\n        { num: '09', delay: 0, title: 'Business Expansion Advisory', tag: 'Scaling', body: 'Growth needs a different playbook than launch. Adding activities, opening a branch, hiring, or entering the GCC: we plan your next phase.', bullets: 'Licence activity amendments · Branch office setup · GCC market entry advisory · Strategic growth planning', wa: askWa('Business Expansion Advisory') },\n        { num: '10', delay: 80, title: 'Ongoing Business Support', tag: 'Long-term partner', body: 'The relationship does not end at setup. Retained advisory keeps renewals, compliance, and strategy reviewed and on time.', bullets: 'Annual renewal management · Compliance calendar & reminders · Regulatory update briefings · Quarterly strategic check-ins', wa: askWa('Ongoing Business Support') },\n      ]),\n      uaeStats: [\n        { n: 'AED 1.78T', delay: 0, label: '2024 real GDP, up 4% year on year' },\n        { n: '$45.6B', delay: 80, label: 'Foreign direct investment, 10th globally' },\n        { n: '2nd', delay: 160, label: 'Globally by greenfield projects announced' },\n        { n: '40+', delay: 240, label: 'Free zones, plus mainland across all seven emirates' },\n      ],\n      insights: [\n        { cat: 'Company Setup', delay: 0, title: 'Free Zone vs Mainland: which UAE jurisdiction is right for you?', body: 'Ownership, market access, cost, visas, and tax. A clear, founder-friendly guide to the first and most consequential decision.', url: 'https://andagain.ae/insights/free-zone-vs-mainland' },\n        { cat: 'Corporate Tax', delay: 100, title: 'Corporate tax for new UAE companies', body: 'Registration, rates, Free Zone treatment, records, and deadlines: what founders should know before tax becomes a year-end problem.', url: 'https://andagain.ae/insights/corporate-tax-new-uae-companies' },\n        { cat: 'Banking', delay: 200, title: 'Opening a corporate bank account in the UAE', body: 'What banks really review: documents, shareholder profile, source of funds, activity, and transaction flow. How to be bankable.', url: 'https://andagain.ae/insights/corporate-bank-account-uae' },\n      ],\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
