document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  const FONT_MIME = /^(font[/]|application[/](x-)?font-|application[/]vnd\.ms-fontobject)/i;
  const MIME_TOKEN = /^[\w.+-]+[/][\w.+-]+$/;
  function toBase64(bytes) {
    let bin = '';
    for (let i = 0; i < bytes.length; i += 0x8000) {
      bin += String.fromCharCode.apply(null, bytes.subarray(i, i + 0x8000));
    }
    return btoa(bin);
  }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    // Failed resource loads (CSP-blocked links, scripts, images) fire plain
    // events at the element — warn only; real JS errors carry message/error.
    if (!e.message && !e.error && e.target && e.target !== window) {
      console.warn('[bundle] resource failed to load:',
        e.target.tagName, String(e.target.src || e.target.href || ''));
      return;
    }
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    // Nested page bundles (iframe targets). Each ships ONCE, in the ROOT
    // document's manifest; frame srcs carry an about:blank#<uuid> marker
    // instead of a substitutable uuid. Every document mints the blobs for
    // its OWN frames — from local text at the root, or text obtained from
    // its DIRECT parent over the relay protocol below — so each frame
    // navigation stays same-origin with its initiator and a deduped page
    // loads at any depth on any host, including a file:// download's
    // opaque origins (where a blob minted by one document cannot be
    // navigated to by another).
    const pageOrderEl = document.querySelector('script[type="__bundler/page_order"]');
    const pageOrder = pageOrderEl ? JSON.parse(pageOrderEl.textContent) : [];
    const pageSet = new Set(pageOrder);
    const pageTexts = {};

    // ── Nested-page text protocol (parent-chain relay) ──
    // Page bundles ship once, in the ROOT document's manifest. Every
    // document mints the blobs for its OWN frames, obtaining page text
    // through a strict parent-chain relay: a document only ever SENDS to
    // its direct parent (which, for every document the publisher's own
    // runtime minted, is another publisher document) and only ACCEPTS
    // text from that direct parent; requests from below are honored only
    // for the document's own child frames, and the ROOT never sends
    // upward at all. That last rule is load-bearing: the artifact host's
    // frame-ancestors allows claude.ai (and friends) to frame an
    // artifact, so window.top can be a FOREIGN document — a top-addressed
    // protocol would hand page uuids to that ancestor and accept forged
    // "page text" from it, minting attacker HTML as an artifact-origin
    // blob document. The chain never touches the ancestor: requests stop
    // at the root, replies are origin-addressed per hop (never '*' when
    // an origin exists), and both directions are origin-gated (on https
    // a foreign sender's origin can never equal this document's; in
    // opaque contexts — file:// — everything serializes as 'null', where
    // an embedded EXTERNAL frame still fails the gate by carrying its
    // own real origin, and a sandboxed child of such a frame is excluded
    // by the own-child-frames check plus uuid unguessability). Shape is
    // deny-by-default: one request form, one reply form, no error
    // replies.
    // window.origin is the SERIALIZED SECURITY origin ('null' in opaque
    // contexts such as a sandboxed preview iframe) — location.origin is
    // computed from the URL and stays 'https://…' even when the document
    // is sandboxed, which would misgate every opaque chain.
    const OWN_TARGET = /^https?:[/][/]/.test(window.origin || '')
      ? window.origin
      : '*';
    function trustedOrigin(e) {
      if (e.origin === window.origin) return true; // https chains; opaque==opaque
      // file:// trees: Chrome serializes the file document's origin as
      // 'file://' while the blob: documents it mints serialize as 'null',
      // so the two legitimate shapes can never string-match — accept the
      // pair in both directions. https origins never serialize as either,
      // and sender identity (own child frame / direct parent) is checked
      // separately.
      return (
        (e.origin === 'null' &&
          (window.origin === 'file://' ||
            window.location.protocol === 'file:')) ||
        (/^file:/.test(e.origin) && window.origin === 'null')
      );
    }
    // Non-empty only in the root document (nested bundles ship an empty
    // island), so it doubles as the root marker: the root answers from
    // local text and treats a miss as authoritative — never relaying to
    // its (possibly foreign) parent.
    const isPageRoot = pageOrder.length > 0;
    const blobUrls = {};
    const resourceBlobs = {};
    const UUID_SHAPE = /^[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}$/;
    const pendingFrames = {}; // uuid -> [{el, frag}] awaiting text for own frames
    const pendingRelays = {}; // uuid -> [childWindow] awaiting text to pass down
    function mountPage(el, frag, text) {
      const pageBlob = new Blob([text], { type: 'text/html' });
      const u = URL.createObjectURL(pageBlob);
      resourceBlobs[u] = pageBlob;
      el.src = u + frag;
    }
    function deliverPage(uuid, text) {
      const frames = pendingFrames[uuid];
      delete pendingFrames[uuid];
      if (frames) for (const f of frames) mountPage(f.el, f.frag, text);
      const relays = pendingRelays[uuid];
      delete pendingRelays[uuid];
      if (relays) {
        for (const cw of relays) {
          try { cw.postMessage({ __bundler_page: uuid, __bundler_text: text }, OWN_TARGET); } catch (err) { /* gone */ }
        }
      }
    }
    function ownFrameWindows() {
      const out = [];
      for (const f of Array.from(document.querySelectorAll('iframe'))) {
        try { if (f.contentWindow) out.push(f.contentWindow); } catch (err) { /* detached */ }
      }
      return out;
    }
    window.addEventListener('message', function (e) {
      const d = e.data;
      if (!d || typeof d !== 'object' || !e.source) return;
      // Origin gate first; the structural checks below (own-child-frames
      // for requests, direct-parent + solicited-uuid for replies, the
      // root's never-relay rule) are what hold in fully opaque chains
      // where origin strings can't discriminate — a sandboxed root's
      // FOREIGN wrapper still fails all three even though both serialize
      // as real-vs-'null' rather than matching.
      if (!trustedOrigin(e)) return;
      if (typeof d.__bundler_need === 'string' && UUID_SHAPE.test(d.__bundler_need)) {
        // Requests are honored only for this document's own child frames.
        if (ownFrameWindows().indexOf(e.source) < 0) return;
        const uuid = d.__bundler_need;
        const text = pageTexts[uuid];
        if (typeof text === 'string') {
          try { e.source.postMessage({ __bundler_page: uuid, __bundler_text: text }, OWN_TARGET); } catch (err) { /* gone */ }
          return;
        }
        if (isPageRoot || window.parent === window) return; // authoritative miss
        const waiting = pendingRelays[uuid];
        if (waiting) {
          if (waiting.indexOf(e.source) < 0) waiting.push(e.source);
          return;
        }
        // Never-answered uuids would otherwise accumulate forever under a
        // request spray; past the cap (far above any real page count) new
        // relays are dropped rather than remembered.
        if (Object.keys(pendingRelays).length >= 128) return;
        pendingRelays[uuid] = [e.source];
        window.parent.postMessage({ __bundler_need: uuid }, OWN_TARGET);
      } else if (
        typeof d.__bundler_page === 'string' &&
        UUID_SHAPE.test(d.__bundler_page) &&
        typeof d.__bundler_text === 'string'
      ) {
        // The shape test is load-bearing beyond tidiness: the solicited
        // check below uses the in operator, which matches prototype keys
        // ('__proto__', 'constructor') — an unshaped key would reach
        // deliverPage and throw, painting the error banner.
        // Text is accepted only from the direct parent — the document
        // that minted this one.
        if (e.source !== window.parent || window.parent === window) return;
        if (!(d.__bundler_page in pendingFrames) && !(d.__bundler_page in pendingRelays)) return;
        deliverPage(d.__bundler_page, d.__bundler_text);
      }
    });

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        if (pageSet.has(uuid)) {
          pageTexts[uuid] = new TextDecoder().decode(finalBytes);
          return;
        }
        if (FONT_MIME.test(entry.mime) && MIME_TOKEN.test(entry.mime)) {
          // Strict artifact hosts allow font-src data: but not blob:.
          blobUrls[uuid] = 'data:' + entry.mime + ';base64,' +
            (entry.compressed ? toBase64(finalBytes) : entry.data);
        } else {
          const blob = new Blob([finalBytes], { type: entry.mime });
          blobUrls[uuid] = URL.createObjectURL(blob);
          resourceBlobs[blobUrls[uuid]] = blob;
        }
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        const blob = new Blob([], { type: entry.mime });
        blobUrls[uuid] = URL.createObjectURL(blob);
        resourceBlobs[blobUrls[uuid]] = blob;
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    // Artifact-host CSP (connect-src 'self') refuses fetch() of blob: URLs —
    // consumers read these Blobs directly. Survives the swap like the error sink.
    window.__resourceBlobs = resourceBlobs;

    setStatus('Rendering...');
    // Page uuids have no blob here — they ride inside about:blank#<uuid>
    // frame markers the pass below resolves after the swap.
    for (const uuid of uuids) {
      if (pageSet.has(uuid)) continue;
      template = template.split(uuid).join(blobUrls[uuid]);
    }

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).replace(/<\//g, '<\\/') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);

    // Resolve page-frame markers: mint this document's own blob for each
    // framed page — from local text when this is the root, otherwise by
    // asking the direct parent over the relay protocol above. An
    // unanswered request leaves the frame on about:blank, the same
    // degraded state as a refused embed.
    {
      const MARKER = /^about:blank#([0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12})(#.*)?$/;
      const needed = [];
      for (const el of Array.from(document.querySelectorAll('iframe'))) {
        const m = MARKER.exec(el.getAttribute('src') || '');
        if (!m) continue;
        const text = pageTexts[m[1]];
        if (typeof text === 'string') {
          mountPage(el, m[2] || '', text);
        } else if (window.parent !== window && !isPageRoot) {
          const had = pendingFrames[m[1]];
          (pendingFrames[m[1]] = had || []).push({ el: el, frag: m[2] || '' });
          if (!had) needed.push(m[1]);
        }
      }
      for (const uuid of needed) {
        window.parent.postMessage({ __bundler_need: uuid }, OWN_TARGET);
      }
    }

    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: read and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const pre = resourceBlobs[s.src.split('#')[0]];
        s.textContent = pre ? await pre.text() : await (await fetch(s.src)).text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

tyle=\"position:absolute;inset:0;background:linear-gradient(to right, #06037A 8%, rgba(6,3,122,0.82) 45%, rgba(6,3,122,0.42) 100%);\"><\u002Fdiv>\n  <div style=\"position:absolute;inset:0;background:linear-gradient(to top, #06037A 4%, rgba(6,3,122,0.3) 40%, rgba(6,3,122,0.12) 100%);\"><\u002Fdiv>\n  <div class=\"m-pad\" style=\"max-width:1100px;margin:0 auto;padding:88px 24px 72px;position:relative;\">\n    <div style=\"display:flex;align-items:center;gap:14px;margin-bottom:28px;flex-wrap:wrap;\">\n      <span style=\"background:linear-gradient(135deg,#FFD663,#D2AA24);color:#06037A;font-size:11px;font-weight:800;letter-spacing:0.18em;text-transform:uppercase;padding:7px 14px;\">AAA Weekly · UAE Business Pulse<\u002Fspan>\n      <span style=\"font-size:12.5px;letter-spacing:0.14em;text-transform:uppercase;color:#A5A2C6;font-weight:600;\">Issue 01 · Week of 14–20 July 2026<\u002Fspan>\n    <\u002Fdiv>\n    <h1 style=\"font-weight:800;font-size:clamp(32px,5.5vw,54px);line-height:1.08;letter-spacing:-0.02em;margin:0;max-width:860px;text-wrap:balance;\">Record trade and technology access strengthen the UAE, as Hormuz tensions test corporate resilience<\u002Fh1>\n    <p style=\"font-size:17px;line-height:1.7;color:#A5A2C6;max-width:680px;margin:26px 0 0;\">The UAE's long-term direction remains strong. This week showed why companies must now pair growth planning with serious operational resilience. Ten developments, and what each one means for your business.<\u002Fp>\n    <div style=\"display:flex;gap:24px;margin-top:34px;font-size:13px;color:#8582AB;flex-wrap:wrap;\">\n      <span><strong style=\"color:#FFD663;font-weight:700;\">12 min read<\u002Fstrong><\u002Fspan>\n      <span>Trade · Logistics · Technology · Banking · Regulation<\u002Fspan>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- At a glance -->\n<section data-screen-label=\"At a glance\" style=\"background:#fff;border-bottom:1px solid #E8E2D2;\">\n  <div class=\"m-pad\" style=\"max-width:1100px;margin:0 auto;padding:64px 24px;\">\n    <div style=\"font-size:12px;letter-spacing:0.24em;text-transform:uppercase;color:#A8851A;font-weight:700;margin-bottom:28px;\">This week at a glance<\u002Fdiv>\n    <div class=\"m-1col\" style=\"display:grid;grid-template-columns:repeat(3,1fr);gap:1px;background:#E8E2D2;border:1px solid #E8E2D2;\">\n      <sc-for list=\"{{ glance }}\" as=\"g\" hint-placeholder-count=\"6\">\n        <div style=\"background:#fff;padding:26px 24px;\">\n          <div style=\"font-size:26px;font-weight:800;letter-spacing:-0.02em;background:linear-gradient(135deg,#B8941F,#D2AA24);-webkit-background-clip:text;background-clip:text;color:transparent;\">{{ g.n }}<\u002Fdiv>\n          <div style=\"font-size:13.5px;color:#5C5972;margin-top:8px;line-height:1.6;\">{{ g.label }}<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fsc-for>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- Contents -->\n<section data-screen-label=\"Contents\" style=\"background:#FAF8F2;border-bottom:1px solid #E8E2D2;\">\n  <div class=\"m-pad\" style=\"max-width:1100px;margin:0 auto;padding:56px 24px;\">\n    <div style=\"font-size:12px;letter-spacing:0.24em;text-transform:uppercase;color:#A8851A;font-weight:700;margin-bottom:24px;\">In this issue<\u002Fdiv>\n    <div class=\"m-1col\" style=\"display:grid;grid-template-columns:1fr 1fr;gap:0 56px;\">\n      <sc-for list=\"{{ toc }}\" as=\"t\" hint-placeholder-count=\"10\">\n        <a href=\"{{ t.href }}\" style=\"display:flex;gap:16px;align-items:baseline;padding:13px 0;border-bottom:1px solid #E8E2D2;color:#16142E;font-size:15px;font-weight:600;\" style-hover=\"color:#A8851A;\">\n          <span style=\"font-size:12px;font-weight:800;color:#D2AA24;min-width:22px;\">{{ t.num }}<\u002Fspan>{{ t.title }}\n        <\u002Fa>\n      <\u002Fsc-for>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- Article body -->\n<article data-screen-label=\"Article\" style=\"background:#FAF8F2;\">\n<div class=\"m-pad\" style=\"max-width:760px;margin:0 auto;padding:72px 24px 40px;\">\n\n  <!-- 01 -->\n  <section id=\"s1\" style=\"margin-bottom:72px;\">\n    <div style=\"display:flex;align-items:baseline;gap:16px;margin-bottom:18px;\"><span style=\"font-size:15px;font-weight:800;background:linear-gradient(135deg,#FFD663,#D2AA24);-webkit-background-clip:text;background-clip:text;color:transparent;\">01<\u002Fspan><span style=\"font-size:11.5px;letter-spacing:0.2em;text-transform:uppercase;color:#8B88A0;font-weight:700;\">Geopolitics<\u002Fspan><\u002Fdiv>\n    <h2 style=\"font-weight:800;font-size:clamp(24px,4vw,32px);line-height:1.15;letter-spacing:-0.015em;margin:0 0 20px;color:#06037A;\">Hormuz tensions turn geopolitical risk into an immediate business risk<\u002Fh2>\n    <p style=\"font-size:16px;line-height:1.75;color:#3E3B58;margin:0 0 16px;\">Regional shipping security deteriorated after two UAE-linked oil tankers were reportedly struck by cruise missiles in the Strait of Hormuz on 14 July, killing one crew member and injuring eight. The United States reinstated its blockade on ships travelling to and from Iranian ports; a proposed 20% transit charge was announced, then withdrawn after Gulf governments objected.<\u002Fp>\n    <div style=\"margin:28px 0;\">\n      <div style=\"position:relative;\">\n        <img src=\"01c9fcd0-11e0-4d3a-b772-cc767f016a06\" alt=\"Oil tanker in the Strait of Hormuz at dusk\" style=\"width:100%;height:340px;object-fit:cover;display:block;\">\n        <div style=\"position:absolute;inset:0;background:linear-gradient(180deg,rgba(6,3,122,0.22) 0%,rgba(6,3,122,0) 40%,rgba(6,3,122,0.3) 100%);\"><\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"display:flex;justify-content:space-between;align-items:center;gap:20px;border:1px solid #E8E2D2;border-top:none;background:#fff;padding:12px 18px;\">\n        <span style=\"font-size:11px;letter-spacing:0.16em;text-transform:uppercase;color:#8B88A0;font-weight:600;\">The Strait of Hormuz · Shipping under pressure<\u002Fspan>\n        <span style=\"font-size:11px;letter-spacing:0.16em;text-transform:uppercase;color:#A8851A;font-weight:700;\">AAA Weekly · UAE Business Pulse<\u002Fspan>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <p style=\"font-size:16px;line-height:1.75;color:#3E3B58;margin:0 0 16px;\">Brent crude held above USD 90 per barrel on 20 July, up roughly 20% for the month. The Strait is not only an energy story: it is the commercial artery connecting the Gulf to Asia, Europe and Africa. Any sustained reduction in traffic feeds into insurance premiums, container availability, delivery timelines, working capital and confidence.<\u002Fp>\n    <div style=\"background:#fff;border:1px solid #E8E2D2;border-top:3px solid #D2AA24;padding:26px 30px;margin:26px 0;\">\n      <div style=\"font-size:11.5px;letter-spacing:0.2em;text-transform:uppercase;color:#A8851A;font-weight:800;margin-bottom:12px;\">What businesses should do<\u002Fdiv>\n      <p style=\"font-size:14.5px;line-height:1.7;color:#3E3B58;margin:0 0 12px;\">Map which suppliers, customers and routes depend on the Strait, directly or through ports, forwarders and transshipment points. Then review:<\u002Fp>\n      <div style=\"display:grid;gap:8px;font-size:14.5px;color:#3E3B58;line-height:1.55;\">\n        <div style=\"display:flex;gap:10px;\"><span style=\"color:#D2AA24;font-size:8px;line-height:2.6;\">◆<\u002Fspan><span>Minimum stock levels, alternative suppliers and shipping routes<\u002Fspan><\u002Fdiv>\n        <div style=\"display:flex;gap:10px;\"><span style=\"color:#D2AA24;font-size:8px;line-height:2.6;\">◆<\u002Fspan><span>Cargo and business-interruption insurance<\u002Fspan><\u002Fdiv>\n        <div style=\"display:flex;gap:10px;\"><span style=\"color:#D2AA24;font-size:8px;line-height:2.6;\">◆<\u002Fspan><span>Force-majeure and price-adjustment clauses<\u002Fspan><\u002Fdiv>\n        <div style=\"display:flex;gap:10px;\"><span style=\"color:#D2AA24;font-size:8px;line-height:2.6;\">◆<\u002Fspan><span>Emergency cash reserves and continuity plans<\u002Fspan><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"background:#06037A;padding:28px 32px;margin:26px 0 0;position:relative;overflow:hidden;\">\n      <img src=\"1bfc0ed7-837f-484c-8dfa-0109e396fa09\" alt=\"\" style=\"position:absolute;right:-30px;bottom:-40px;height:150px;opacity:0.08;\">\n      <div style=\"font-size:11.5px;letter-spacing:0.2em;text-transform:uppercase;color:#FFD663;font-weight:800;margin-bottom:12px;\">And Again Advisory perspective<\u002Fdiv>\n      <p style=\"font-size:14.5px;line-height:1.75;color:#D6D4E8;margin:0;position:relative;\">Geopolitical risk now belongs inside feasibility studies and forecasts. Model three scenarios: normalisation, moderate disruption, prolonged disruption. The goal is not to discourage investment; it is to enter the market with realistic margins, sufficient liquidity and supplier alternatives.<\u002Fp>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- 02 -->\n  <section id=\"s2\" style=\"margin-bottom:72px;\">\n    <div style=\"display:flex;align-items:baseline;gap:16px;margin-bottom:18px;\"><span style=\"font-size:15px;font-weight:800;background:linear-gradient(135deg,#FFD663,#D2AA24);-webkit-background-clip:text;background-clip:text;color:transparent;\">02<\u002Fspan><span style=\"font-size:11.5px;letter-spacing:0.2em;text-transform:uppercase;color:#8B88A0;font-weight:700;\">Logistics<\u002Fspan><\u002Fdiv>\n    <h2 style=\"font-weight:800;font-size:clamp(24px,4vw,32px);line-height:1.15;letter-spacing:-0.015em;margin:0 0 20px;color:#06037A;\">Fujairah and alternative trade corridors move to the centre of logistics planning<\u002Fh2>\n    <p style=\"font-size:16px;line-height:1.75;color:#3E3B58;margin:0 0 16px;\">The Financial Times reported that DP World is in discussions on a new multipurpose port and container terminal in Fujairah, giving companies access via the Gulf of Oman and reducing dependence on routes inside the Strait. DP World declined to confirm the project but acknowledged diversification plans; the reported investment runs to several hundred million dollars with completion possible within roughly 18 months.<\u002Fp>\n    <div style=\"margin:28px 0;\">\n      <div style=\"position:relative;\">\n        <img src=\"d326025f-909f-4873-abd5-d17b972d68ee\" alt=\"Container terminal at blue hour\" style=\"width:100%;height:340px;object-fit:cover;display:block;\">\n        <div style=\"position:absolute;inset:0;background:linear-gradient(180deg,rgba(6,3,122,0.22) 0%,rgba(6,3,122,0) 40%,rgba(6,3,122,0.3) 100%);\"><\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"display:flex;justify-content:space-between;align-items:center;gap:20px;border:1px solid #E8E2D2;border-top:none;background:#fff;padding:12px 18px;\">\n        <span style=\"font-size:11px;letter-spacing:0.16em;text-transform:uppercase;color:#8B88A0;font-weight:600;\">Eastern-coast corridors · Fujairah, Khorfakkan, Hatta<\u002Fspan>\n        <span style=\"font-size:11px;letter-spacing:0.16em;text-transform:uppercase;color:#A8851A;font-weight:700;\">AAA Weekly · UAE Business Pulse<\u002Fspan>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <p style=\"font-size:16px;line-height:1.75;color:#3E3B58;margin:0 0 16px;\">Dubai Customs, meanwhile, already allows eligible shipments to enter through Fujairah, Khorfakkan and the Hatta border. Its expanded Green Corridor handled 203,242 containers worth AED 33.9 billion between March and June, from 188 countries, with an instant-clearance rate of about 93%.<\u002Fp>\n    <div style=\"background:#fff;border:1px solid #E8E2D2;border-top:3px solid #D2AA24;padding:26px 30px;margin:26px 0;\">\n      <div style=\"font-size:11.5px;letter-spacing:0.2em;text-transform:uppercase;color:#A8851A;font-weight:800;margin-bottom:12px;\">Why it matters<\u002Fdiv>\n      <p style=\"font-size:14.5px;line-height:1.7;color:#3E3B58;margin:0;\">Traditional port arrangements are no longer automatically the most reliable or economical option. Importers, especially in food, medical supplies and time-sensitive inventory, should compare Jebel Ali against eastern-coast entry on cost, clearance, storage and delivery time.<\u002Fp>\n    <\u002Fdiv>\n    <div style=\"background:#06037A;padding:28px 32px;margin:26px 0 0;position:relative;overflow:hidden;\">\n      <img src=\"1bfc0ed7-837f-484c-8dfa-0109e396fa09\" alt=\"\" style=\"position:absolute;right:-30px;bottom:-40px;height:150px;opacity:0.08;\">\n      <div style=\"font-size:11.5px;letter-spacing:0.2em;text-transform:uppercase;color:#FFD663;font-weight:800;margin-bottom:12px;\">And Again Advisory perspective<\u002Fdiv>\n      <p style=\"font-size:14.5px;line-height:1.75;color:#D6D4E8;margin:0;position:relative;\">Port selection belongs in the operating model from day one. A company can be licensed in one emirate and import, store or distribute through another. Choosing a formation jurisdiction without considering the logistics model creates unnecessary cost later.<\u002Fp>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- 03 -->\n  <section id=\"s3\" style=\"margin-bottom:72px;\">\n    <div style=\"display:flex;align-items:baseline;gap:16px;margin-bottom:18px;\"><span style=\"font-size:15px;font-weight:800;background:linear-gradient(135deg,#FFD663,#D2AA24);-webkit-background-clip:text;background-clip:text;color:transparent;\">03<\u002Fspan><span style=\"font-size:11.5px;letter-spacing:0.2em;text-transform:uppercase;color:#8B88A0;font-weight:700;\">Trade<\u002Fspan><\u002Fdiv>\n    <h2 style=\"font-weight:800;font-size:clamp(24px,4vw,32px);line-height:1.15;letter-spacing:-0.015em;margin:0 0 20px;color:#06037A;\">UAE non-oil trade reaches a new record<\u002Fh2>\n    <p style=\"font-size:16px;line-height:1.75;color:#3E3B58;margin:0 0 16px;\">Non-oil foreign trade reached approximately AED 1.937 trillion in the first half of 2026, up 13.1% year on year. Non-oil exports rose 23.9% to AED 452.8 billion, now 23.4% of total non-oil trade: evidence of the UAE's shift from re-export centre to producer and exporter. China remained the largest partner (AED 180.7 billion), followed by Switzerland (AED 138.4 billion) and India (AED 107.5 billion). Gold was the largest commodity at AED 706.2 billion.<\u002Fp>\n    <p style=\"font-size:16px;line-height:1.75;color:#3E3B58;margin:0 0 16px;\">Trade under fully operational Comprehensive Economic Partnership Agreements reached AED 304.3 billion, with UAE non-oil exports to those markets at AED 66.1 billion. CEPAs are moving beyond announcements and into actual commercial flows: reduced duties, predictable rules of origin, faster customs cooperation. Lower tariffs are not automatic, though; products must satisfy rules of origin and documentation conditions.<\u002Fp>\n    <div style=\"background:#fff;border:1px solid #E8E2D2;border-top:3px solid #D2AA24;padding:26px 30px;margin:26px 0;\">\n      <div style=\"font-size:11.5px;letter-spacing:0.2em;text-transform:uppercase;color:#A8851A;font-weight:800;margin-bottom:12px;\">Why it matters for SMEs<\u002Fdiv>\n      <p style=\"font-size:14.5px;line-height:1.7;color:#3E3B58;margin:0;\">The record creates room for smaller businesses in food processing, consumer products, building materials, logistics, trade finance, packaging and distribution. African and Ethiopian businesses can use the UAE as a platform into Asia, the Gulf and Europe, provided they bring a viable product, a documented supply chain and a clear read on the destination market.<\u002Fp>\n    <\u002Fdiv>\n    <div style=\"background:#06037A;padding:28px 32px;margin:26px 0 0;position:relative;overflow:hidden;\">\n      <img src=\"1bfc0ed7-837f-484c-8dfa-0109e396fa09\" alt=\"\" style=\"position:absolute;right:-30px;bottom:-40px;height:150px;opacity:0.08;\">\n      <div style=\"font-size:11.5px;letter-spacing:0.2em;text-transform:uppercase;color:#FFD663;font-weight:800;margin-bottom:12px;\">And Again Advisory perspective<\u002Fdiv>\n      <p style=\"font-size:14.5px;line-height:1.75;color:#D6D4E8;margin:0;position:relative;\">Registering a UAE company and building an export-ready operation are different projects. An export feasibility study should cover target demand, product standards, rules of origin, customs classification, transport costs, payment terms, distributor margins and working capital. The infrastructure is an advantage; execution stays with the business.<\u002Fp>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- 04 -->\n  <section id=\"s4\" style=\"margin-bottom:72px;\">\n    <div style=\"display:flex;align-items:baseline;gap:16px;margin-bottom:18px;\"><span style=\"font-size:15px;font-weight:800;background:linear-gradient(135deg,#FFD663,#D2AA24);-webkit-background-clip:text;background-clip:text;color:transparent;\">04<\u002Fspan><span style=\"font-size:11.5px;letter-spacing:0.2em;text-transform:uppercase;color:#8B88A0;font-weight:700;\">Customs<\u002Fspan><\u002Fdiv>\n    <h2 style=\"font-weight:800;font-size:clamp(24px,4vw,32px);line-height:1.15;letter-spacing:-0.015em;margin:0 0 20px;color:#06037A;\">Dubai Customs measures provide liquidity and operational relief<\u002Fh2>\n    <p style=\"font-size:16px;line-height:1.75;color:#3E3B58;margin:0 0 16px;\">Dubai Customs delivered more than AED 79 million in liquidity support to 428 companies, while over 6,600 firms benefited from an extended 120-day settlement period for eligible customs transactions. Other measures included duty instalments, an 80% reduction in certain penalties, and transit periods extended from 30 to 90 days. More than 4,000 new customers registered during the period.<\u002Fp>\n    <p style=\"font-size:16px;line-height:1.75;color:#3E3B58;margin:0 0 16px;\">Customs duties are normally paid before goods are sold or customers pay. Extended settlement and instalments directly ease working-capital pressure, especially for importers with large inventories, food and commodity traders, automotive and spare-parts firms, and medical suppliers. Relief is not automatic; eligibility and documentation must be confirmed with Dubai Customs or an authorised representative.<\u002Fp>\n    <div style=\"background:#06037A;padding:28px 32px;margin:26px 0 0;position:relative;overflow:hidden;\">\n      <img src=\"1bfc0ed7-837f-484c-8dfa-0109e396fa09\" alt=\"\" style=\"position:absolute;right:-30px;bottom:-40px;height:150px;opacity:0.08;\">\n      <div style=\"font-size:11.5px;letter-spacing:0.2em;text-transform:uppercase;color:#FFD663;font-weight:800;margin-bottom:12px;\">And Again Advisory perspective<\u002Fdiv>\n      <p style=\"font-size:14.5px;line-height:1.75;color:#D6D4E8;margin:0;position:relative;\">Customs planning is the most overlooked line in UAE entry budgets. Founders count licence, visas, rent and staff, then under-allocate for duties, VAT, freight, insurance, clearance and storage. For import-based businesses, working-capital planning matters more than the formation cost itself.<\u002Fp>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- 05 -->\n  <section id=\"s5\" style=\"margin-bottom:72px;\">\n    <div style=\"display:flex;align-items:baseline;gap:16px;margin-bottom:18px;\"><span style=\"font-size:15px;font-weight:800;background:linear-gradient(135deg,#FFD663,#D2AA24);-webkit-background-clip:text;background-clip:text;color:transparent;\">05<\u002Fspan><span style=\"font-size:11.5px;letter-spacing:0.2em;text-transform:uppercase;color:#8B88A0;font-weight:700;\">Technology<\u002Fspan><\u002Fdiv>\n    <h2 style=\"font-weight:800;font-size:clamp(24px,4vw,32px);line-height:1.15;letter-spacing:-0.015em;margin:0 0 20px;color:#06037A;\">US export-control upgrade strengthens the UAE's advanced-technology position<\u002Fh2>\n    <p style=\"font-size:16px;line-height:1.75;color:#3E3B58;margin:0 0 16px;\">The US Bureau of Industry and Security moved the UAE from Country Groups D:3 and D:4 to Country Group A:5, effective 10 July. A:5 destinations receive more favourable treatment under the Strategic Trade Authorization framework: approved UAE government entities and qualifying companies can access certain controlled technologies without a licence for every transaction, including selected advanced-computing products such as AI chips and servers.<\u002Fp>\n    <p style=\"font-size:16px;line-height:1.75;color:#3E3B58;margin:0 0 16px;\">The relevant categories span artificial intelligence, advanced computing, semiconductor infrastructure, data centres, civil nuclear energy, aerospace and satellites. This is not a blanket exemption: eligibility depends on the recipient, the technology, the end use, security arrangements, recordkeeping and re-export restrictions. UAE licensing, data-protection and cybersecurity rules continue to apply.<\u002Fp>\n    <div style=\"background:#fff;border:1px solid #E8E2D2;border-top:3px solid #D2AA24;padding:26px 30px;margin:26px 0;\">\n      <div style=\"font-size:11.5px;letter-spacing:0.2em;text-transform:uppercase;color:#A8851A;font-weight:800;margin-bottom:12px;\">Why it matters<\u002Fdiv>\n      <p style=\"font-size:14.5px;line-height:1.7;color:#3E3B58;margin:0;\">The upgrade is a formal signal that approved UAE institutions meet higher technology-protection standards. Expect stronger pull for AI data centres, cloud infrastructure, semiconductor-linked investment, aerospace and R&amp;D, and more international firms building technical operations here rather than sales offices only.<\u002Fp>\n    <\u002Fdiv>\n    <div style=\"background:#06037A;padding:28px 32px;margin:26px 0 0;position:relative;overflow:hidden;\">\n      <img src=\"1bfc0ed7-837f-484c-8dfa-0109e396fa09\" alt=\"\" style=\"position:absolute;right:-30px;bottom:-40px;height:150px;opacity:0.08;\">\n      <div style=\"font-size:11.5px;letter-spacing:0.2em;text-transform:uppercase;color:#FFD663;font-weight:800;margin-bottom:12px;\">And Again Advisory perspective<\u002Fdiv>\n      <p style=\"font-size:14.5px;line-height:1.75;color:#D6D4E8;margin:0;position:relative;\">Consider export-control requirements at the formation stage. The licensed activity, ownership structure, equipment source, end-user profile and operating location all affect access to controlled technology. Ordering equipment before confirming eligibility invites delays, rejected shipments and compliance costs.<\u002Fp>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- 06 -->\n  <section id=\"s6\" style=\"margin-bottom:72px;\">\n    <div style=\"display:flex;align-items:baseline;gap:16px;margin-bottom:18px;\"><span style=\"font-size:15px;font-weight:800;background:linear-gradient(135deg,#FFD663,#D2AA24);-webkit-background-clip:text;background-clip:text;color:transparent;\">06<\u002Fspan><span style=\"font-size:11.5px;letter-spacing:0.2em;text-transform:uppercase;color:#8B88A0;font-weight:700;\">Payments<\u002Fspan><\u002Fdiv>\n    <h2 style=\"font-weight:800;font-size:clamp(24px,4vw,32px);line-height:1.15;letter-spacing:-0.015em;margin:0 0 20px;color:#06037A;\">Jaywan, the first national payment card, begins nationwide issuance<\u002Fh2>\n    <p style=\"font-size:16px;line-height:1.75;color:#3E3B58;margin:0 0 16px;\">On 20 July the Central Bank announced nationwide issuance of Jaywan, the UAE's first national payment-card scheme. Banks, licensed financial institutions and exchange houses will issue cards in phases, supporting point-of-sale, e-commerce, ATMs, digital wallets and contactless payments. The scheme is designed for domestic use, with international transactions subject to applicable arrangements.<\u002Fp>\n    <p style=\"font-size:16px;line-height:1.75;color:#3E3B58;margin:0 0 16px;\">A domestic scheme gives the country greater control over payment routing, local processing, data governance and system continuity. The Central Bank frames Jaywan as payment sovereignty, financial inclusion and resilience. For banks and fintechs it creates work in issuance, processing, fraud prevention, onboarding and wallet integration; for merchants, the effect depends on acceptance arrangements and fees.<\u002Fp>\n    <div style=\"background:#06037A;padding:28px 32px;margin:26px 0 0;position:relative;overflow:hidden;\">\n      <img src=\"1bfc0ed7-837f-484c-8dfa-0109e396fa09\" alt=\"\" style=\"position:absolute;right:-30px;bottom:-40px;height:150px;opacity:0.08;\">\n      <div style=\"font-size:11.5px;letter-spacing:0.2em;text-transform:uppercase;color:#FFD663;font-weight:800;margin-bottom:12px;\">And Again Advisory perspective<\u002Fdiv>\n      <p style=\"font-size:14.5px;line-height:1.75;color:#D6D4E8;margin:0;position:relative;\">Fintechs entering the UAE must distinguish ordinary technology services from regulated financial activity. Software for banks needs a different licence from storing funds, processing payments or issuing instruments. Review the operating model before choosing a jurisdiction or licence.<\u002Fp>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- 07 -->\n  <section id=\"s7\" style=\"margin-bottom:72px;\">\n    <div style=\"display:flex;align-items:baseline;gap:16px;margin-bottom:18px;\"><span style=\"font-size:15px;font-weight:800;background:linear-gradient(135deg,#FFD663,#D2AA24);-webkit-background-clip:text;background-clip:text;color:transparent;\">07<\u002Fspan><span style=\"font-size:11.5px;letter-spacing:0.2em;text-transform:uppercase;color:#8B88A0;font-weight:700;\">Digital assets<\u002Fspan><\u002Fdiv>\n    <h2 style=\"font-weight:800;font-size:clamp(24px,4vw,32px);line-height:1.15;letter-spacing:-0.015em;margin:0 0 20px;color:#06037A;\">Stablecoin governance moves closer to the financial mainstream<\u002Fh2>\n    <p style=\"font-size:16px;line-height:1.75;color:#3E3B58;margin:0 0 16px;\">The Middle East Stablecoin Association was incorporated in the DIFC on 15 July as a non-profit, the region's first dedicated stablecoin industry body. It will convene issuers, banks, exchanges, payment companies, advisers, infrastructure providers and policymakers around research, education, policy dialogue and industry standards.<\u002Fp>\n    <p style=\"font-size:16px;line-height:1.75;color:#3E3B58;margin:0 0 16px;\">Stablecoins are being weighed for cross-border payments, treasury transfers, supplier settlement, remittances and tokenised markets. The UAE already regulates payment tokens and virtual assets through the Central Bank, DFSA, VARA and ADGM's FSRA. The association does not replace regulators; its value is a forum for standards and implementation.<\u002Fp>\n    <div style=\"background:#06037A;padding:28px 32px;margin:26px 0 0;position:relative;overflow:hidden;\">\n      <img src=\"1bfc0ed7-837f-484c-8dfa-0109e396fa09\" alt=\"\" style=\"position:absolute;right:-30px;bottom:-40px;height:150px;opacity:0.08;\">\n      <div style=\"font-size:11.5px;letter-spacing:0.2em;text-transform:uppercase;color:#FFD663;font-weight:800;margin-bottom:12px;\">And Again Advisory perspective<\u002Fdiv>\n      <p style=\"font-size:14.5px;line-height:1.75;color:#D6D4E8;margin:0;position:relative;\">Calling a venture a \"technology company\" does not stop the activity being financially regulated. Before launching a stablecoin, wallet, exchange or payment platform, confirm which regulator has jurisdiction and whether the activity is permitted in the proposed jurisdiction.<\u002Fp>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- 08 -->\n  <section id=\"s8\" style=\"margin-bottom:72px;\">\n    <div style=\"display:flex;align-items:baseline;gap:16px;margin-bottom:18px;\"><span style=\"font-size:15px;font-weight:800;background:linear-gradient(135deg,#FFD663,#D2AA24);-webkit-background-clip:text;background-clip:text;color:transparent;\">08<\u002Fspan><span style=\"font-size:11.5px;letter-spacing:0.2em;text-transform:uppercase;color:#8B88A0;font-weight:700;\">Economy<\u002Fspan><\u002Fdiv>\n    <h2 style=\"font-weight:800;font-size:clamp(24px,4vw,32px);line-height:1.15;letter-spacing:-0.015em;margin:0 0 20px;color:#06037A;\">IMF confirms resilience but expects more uneven growth<\u002Fh2>\n    <p style=\"font-size:16px;line-height:1.75;color:#3E3B58;margin:0 0 16px;\">Concluding a staff visit on 17 July, the IMF described the UAE economy as significantly resilient: strong financial buffers, well-capitalised banks, and supply chains and market confidence maintained through the conflict. It nonetheless expects GDP slightly lower in 2026, driven by weaker non-hydrocarbon activity, with tourism, transportation, trade and real estate affected by uncertainty.<\u002Fp>\n    <p style=\"font-size:16px;line-height:1.75;color:#3E3B58;margin:0 0 16px;\">Recovery could begin in the second half if conditions normalise, with stronger growth expected in 2027. Inflation may rise moderately on food and energy costs, while fiscal and external accounts remain in surplus. The real-estate market has moderated, though prices generally remain at or above 2025 levels.<\u002Fp>\n    <div style=\"background:#06037A;padding:28px 32px;margin:26px 0 0;position:relative;overflow:hidden;\">\n      <img src=\"1bfc0ed7-837f-484c-8dfa-0109e396fa09\" alt=\"\" style=\"position:absolute;right:-30px;bottom:-40px;height:150px;opacity:0.08;\">\n      <div style=\"font-size:11.5px;letter-spacing:0.2em;text-transform:uppercase;color:#FFD663;font-weight:800;margin-bottom:12px;\">And Again Advisory perspective<\u002Fdiv>\n      <p style=\"font-size:14.5px;line-height:1.75;color:#D6D4E8;margin:0;position:relative;\">Do not build a business plan on one national GDP forecast. Test lower revenue, higher freight and insurance costs, delayed payments and longer entry periods. A resilient company is not one that assumes nothing goes wrong; it is one that stays viable when conditions disappoint.<\u002Fp>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- 09 -->\n  <section id=\"s9\" style=\"margin-bottom:72px;\">\n    <div style=\"display:flex;align-items:baseline;gap:16px;margin-bottom:18px;\"><span style=\"font-size:15px;font-weight:800;background:linear-gradient(135deg,#FFD663,#D2AA24);-webkit-background-clip:text;background-clip:text;color:transparent;\">09<\u002Fspan><span style=\"font-size:11.5px;letter-spacing:0.2em;text-transform:uppercase;color:#8B88A0;font-weight:700;\">Capital markets<\u002Fspan><\u002Fdiv>\n    <h2 style=\"font-weight:800;font-size:clamp(24px,4vw,32px);line-height:1.15;letter-spacing:-0.015em;margin:0 0 20px;color:#06037A;\">Capital markets remain active despite higher risk<\u002Fh2>\n    <div style=\"margin:28px 0;\">\n      <div style=\"position:relative;\">\n        <img src=\"2db2281b-cf73-46f3-9d6a-27057cea33c9\" alt=\"Financial district towers at night\" style=\"width:100%;height:340px;object-fit:cover;display:block;\">\n        <div style=\"position:absolute;inset:0;background:linear-gradient(180deg,rgba(6,3,122,0.22) 0%,rgba(6,3,122,0) 40%,rgba(6,3,122,0.3) 100%);\"><\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"display:flex;justify-content:space-between;align-items:center;gap:20px;border:1px solid #E8E2D2;border-top:none;background:#fff;padding:12px 18px;\">\n        <span style=\"font-size:11px;letter-spacing:0.16em;text-transform:uppercase;color:#8B88A0;font-weight:600;\">Capital markets · Sukuk, banking and derivatives<\u002Fspan>\n        <span style=\"font-size:11px;letter-spacing:0.16em;text-transform:uppercase;color:#A8851A;font-weight:700;\">AAA Weekly · UAE Business Pulse<\u002Fspan>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <p style=\"font-size:16px;line-height:1.75;color:#3E3B58;margin:0 0 16px;\"><strong style=\"font-weight:700;color:#06037A;\">Ajman Bank<\u002Fstrong> listed a USD 300 million Additional Tier 1 perpetual sukuk on Nasdaq Dubai on 14 July: Mudaraba structure, 6.50% return, 1.7-times oversubscribed, 89% allocated to MENA investors. Nasdaq Dubai now carries roughly USD 98 billion in outstanding sukuk across USD 140 billion of listed debt.<\u002Fp>\n    <p style=\"font-size:16px;line-height:1.75;color:#3E3B58;margin:0 0 16px;\"><strong style=\"font-weight:700;color:#06037A;\">Dubai Islamic Bank<\u002Fstrong> reported first-half gross revenue of AED 12.4 billion, up 10%, with financing assets of AED 281 billion and pre-tax profit of AED 4.3 billion; 98% of customers now transact digitally. <strong style=\"font-weight:700;color:#06037A;\">ADX<\u002Fstrong> added six single-stock futures, bringing its derivatives offering to 17 futures and 50 contracts, with data reaching about 350,000 Bloomberg Terminal users.<\u002Fp>\n    <div style=\"background:#fff;border:1px solid #E8E2D2;border-top:3px solid #D2AA24;padding:26px 30px;margin:26px 0 0;\">\n      <div style=\"font-size:11.5px;letter-spacing:0.2em;text-transform:uppercase;color:#A8851A;font-weight:800;margin-bottom:12px;\">Why it matters<\u002Fdiv>\n      <p style=\"font-size:14.5px;line-height:1.7;color:#3E3B58;margin:0;\">Deeper sukuk, banking and derivatives markets give companies more ways to raise capital, hedge exposure and structure Sharia-compliant financing. For SMEs, stronger capital markets gradually improve financing availability across the economy.<\u002Fp>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- 10 -->\n  <section id=\"s10\" style=\"margin-bottom:24px;\">\n    <div style=\"display:flex;align-items:baseline;gap:16px;margin-bottom:18px;\"><span style=\"font-size:15px;font-weight:800;background:linear-gradient(135deg,#FFD663,#D2AA24);-webkit-background-clip:text;background-clip:text;color:transparent;\">10<\u002Fspan><span style=\"font-size:11.5px;letter-spacing:0.2em;text-transform:uppercase;color:#8B88A0;font-weight:700;\">Outlook<\u002Fspan><\u002Fdiv>\n    <h2 style=\"font-weight:800;font-size:clamp(24px,4vw,32px);line-height:1.15;letter-spacing:-0.015em;margin:0 0 24px;color:#06037A;\">What corporate leaders should watch next<\u002Fh2>\n    <div style=\"display:grid;gap:0;border-top:1px solid #E8E2D2;\">\n      <sc-for list=\"{{ watchlist }}\" as=\"w\" hint-placeholder-count=\"7\">\n        <div style=\"display:grid;grid-template-columns:200px 1fr;gap:24px;padding:20px 0;border-bottom:1px solid #E8E2D2;\" class=\"m-1col\">\n          <div style=\"font-weight:800;font-size:15px;color:#06037A;\">{{ w.title }}<\u002Fdiv>\n          <p style=\"font-size:14.5px;line-height:1.65;color:#5C5972;margin:0;\">{{ w.body }}<\u002Fp>\n        <\u002Fdiv>\n      <\u002Fsc-for>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n<\u002Fdiv>\n<\u002Farticle>\n\n<!-- Closing perspective -->\n<section data-screen-label=\"Closing\" style=\"background:#06037A;color:#fff;position:relative;overflow:hidden;\">\n  <img src=\"1bfc0ed7-837f-484c-8dfa-0109e396fa09\" alt=\"\" class=\"m-hide\" style=\"position:absolute;left:-120px;bottom:-140px;height:420px;opacity:0.05;\">\n  <div class=\"m-pad\" style=\"max-width:760px;margin:0 auto;padding:88px 24px;position:relative;\">\n    <div style=\"font-size:12px;letter-spacing:0.24em;text-transform:uppercase;color:#FFD663;font-weight:700;margin-bottom:20px;\">The bottom line<\u002Fdiv>\n    <h2 style=\"font-weight:800;font-size:clamp(26px,4.5vw,38px);line-height:1.15;letter-spacing:-0.015em;margin:0 0 22px;\">Market entry now requires more than a trade licence<\u002Fh2>\n    <p style=\"font-size:16px;line-height:1.8;color:#A5A2C6;margin:0 0 16px;\">This week's developments show why the UAE keeps attracting entrepreneurs and investors: record non-oil trade, stronger technology partnerships, modern payment infrastructure and deepening capital markets. They also show shipping, energy costs and supply chains under real pressure.<\u002Fp>\n    <p style=\"font-size:16px;line-height:1.8;color:#A5A2C6;margin:0 0 34px;\">Successful entry means informed decisions on structure, licensed activities, customs and distribution, banking, tax, staffing and working capital, made with the geopolitical picture in view. That is the work we do with our clients every week.<\u002Fp>\n    <div style=\"display:flex;gap:14px;flex-wrap:wrap;\">\n      <a href=\"index.html#suite\" style=\"background:linear-gradient(135deg,#FFD663,#D2AA24);color:#06037A;padding:15px 28px;font-size:14px;font-weight:800;display:inline-block;\">Explore our services →<\u002Fa>\n      <a href=\"https://wa.me/971559330941?text=Hello%20And%20Again%20Advisory%2C%20I%20read%20your%20Weekly%20Brief%20and%20would%20like%20to%20talk.\" style=\"border:1px solid rgba(255,255,255,0.35);color:#fff;padding:14px 28px;font-size:14px;font-weight:700;display:inline-flex;align-items:center;gap:9px;\" style-hover=\"border-color:#FFD663;color:#FFD663;\">\n        <svg width=\"15\" height=\"15\" sc-camel-view-box=\"0 0 24 24\" fill=\"#25D366\"><path d=\"M12 2a10 10 0 0 0-8.7 14.9L2 22l5.3-1.4A10 10 0 1 0 12 2zm0 18.2c-1.6 0-3.1-.4-4.4-1.2l-.3-.2-3.1.8.8-3-.2-.3A8.2 8.2 0 1 1 12 20.2zm4.6-6.1c-.3-.1-1.5-.7-1.7-.8-.2-.1-.4-.1-.6.1-.2.3-.6.8-.8 1-.1.2-.3.2-.5.1-.3-.1-1.1-.4-2-1.2-.7-.7-1.2-1.5-1.4-1.7-.1-.3 0-.4.1-.5l.4-.5c.1-.2.2-.3.3-.5.1-.2 0-.3 0-.5-.1-.1-.6-1.4-.8-1.9-.2-.5-.4-.4-.6-.4h-.5c-.2 0-.5.1-.7.3-.2.3-.9.9-.9 2.1s.9 2.4 1 2.6c.1.2 1.8 2.7 4.3 3.8.6.3 1.1.4 1.5.5.6.2 1.2.2 1.6.1.5-.1 1.5-.6 1.7-1.2.2-.6.2-1.1.2-1.2-.1-.1-.3-.2-.6-.3z\"><\u002Fpath><\u002Fsvg>\n        Discuss this briefing\n      <\u002Fa>\n    <\u002Fdiv>\n    <p style=\"font-size:12px;line-height:1.7;color:#63608C;margin:44px 0 0;border-top:1px solid rgba(255,255,255,0.12);padding-top:20px;\">This publication is intended for general information only. It does not constitute legal, tax, financial, investment or regulatory advice. Businesses should obtain professional advice based on their specific activities and circumstances.<\u002Fp>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<footer style=\"background:#03012E;color:#8582AB;\">\n  <div style=\"max-width:1100px;margin:0 auto;padding:28px 24px;display:flex;justify-content:space-between;align-items:center;gap:24px;font-size:12.5px;flex-wrap:wrap;\">\n    <span>© 2026 And Again Advisory · UAE Business Pulse<\u002Fspan>\n    <a href=\"index.html\" style=\"color:#FFD663;font-weight:700;\">andagain.ae →<\u002Fa>\n  <\u002Fdiv>\n<\u002Ffooter>\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\">\nclass Component extends DCLogic {\n  componentDidMount() {\n m adjustments.' },\n        { title: 'Alternative entry routes', body: 'Assess whether Fujairah, Khorfakkan or Hatta could practically replace traditional routes.' },\n        { title: 'Customs relief', body: 'Review settlement extensions, instalments and penalty reductions rather than assuming obligations are fixed.' },\n        { title: 'Export-control rollout', body: 'Watch how UAE commercial entities qualify for A:5 treatment and what security and end-use conditions apply.' },\n        { title: 'Jaywan adoption', body: 'Follow card issuance, acceptance and integration announcements from banks and payment providers.' },\n        { title: 'Stablecoin regulation', body: 'Confirm which UAE regulator has jurisdiction before starting any token or digital-payment model.' },\n        { title: 'Economic forecasting', body: 'Update 2026 projections for tourism, transportation, real estate, logistics and consumer demand.' },\n      ],\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
